name: Simulator build check (no signing)

on:
  workflow_dispatch:
  push:
    branches:
      - 'redesign/**'

jobs:
  build:
    name: Build for iOS Simulator (compile-only, no code signing)
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show available Xcode versions
        run: ls /Applications | grep Xcode

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project novawallet.xcodeproj \
            -scheme novawallet

      - name: Build for Simulator (no signing required)
        run: |
          xcodebuild build \
            -project novawallet.xcodeproj \
            -scheme novawallet \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            ONLY_ACTIVE_ARCH=YES \
            EXCLUDED_ARCHS=x86_64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
