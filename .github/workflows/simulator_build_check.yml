name: Simulator build check (no signing)

on:
  workflow_dispatch:
  push:
    branches:
      - 'redesign/**'

jobs:
  build:
    name: Build for iOS Simulator (compile-only, no code signing)
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show available Xcode versions
        run: ls /Applications | grep Xcode

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project novawallet.xcodeproj \
            -scheme novawallet

      - name: Build for Simulator (no signing required)
        env:
          # Compile-only check — these feed Scripts/inject-keys.sh (Sourcery-generated
          # CIKeys.generated.swift). Real values aren't needed to prove the code compiles,
          # but the script runs under `set -u` and errors on any unset var.
          MERCURYO_PRODUCTION_SECRET: dummy
          MERCURYO_TEST_SECRET: dummy
          ACALA_AUTH_TOKEN: dummy
          MOONBEAM_HISTORY_API_KEY: dummy
          MOONRIVER_HISTORY_API_KEY: dummy
          ETHERSCAN_HISTORY_API_KEY: dummy
          ACALA_TEST_AUTH_TOKEN: dummy
          MOONBEAM_API_KEY: dummy
          MOONBEAM_TEST_API_KEY: dummy
          INFURA_API_KEY: dummy
          WC_PROJECT_ID: dummy
          DWELLIR_API_KEY: dummy
          POLKASSEMBLY_SUMMARY_API_KEY: dummy
        run: |
          xcodebuild build \
            -project novawallet.xcodeproj \
            -scheme novawallet \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            ONLY_ACTIVE_ARCH=YES \
            EXCLUDED_ARCHS=x86_64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
